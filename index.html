<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Voice Synthesizer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <h1>Text to Voice</h1>
            <p>Convert your text into natural-sounding speech</p>
        </header>

        <main>
            <div class="input-group">
                <textarea id="text-input" placeholder="Enter text here to synthesize..." rows="6"></textarea>
            </div>

            <div class="controls-group">
                <div class="control-item">
                    <label for="voice-select">Voice</label>
                    <div class="select-wrapper">
                        <select id="voice-select"></select>
                    </div>
                </div>

                <div class="sliders-container">
                    <div class="control-item slider-item">
                        <div class="slider-header">
                            <label for="rate">Speed</label>
                            <span id="rate-value">1.0</span>
                        </div>
                        <input type="range" id="rate" min="0.5" max="2" value="1" step="0.1">
                    </div>

                    <div class="control-item slider-item">
                        <div class="slider-header">
                            <label for="pitch">Pitch</label>
                            <span id="pitch-value">1.0</span>
                        </div>
                        <input type="range" id="pitch" min="0" max="2" value="1" step="0.1">
                    </div>
                </div>
            </div>

            <div class="buttons-group">
                <button id="play-btn" class="primary-btn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polygon points="5 3 19 12 5 21 5 3"></polygon>
                    </svg>
                    Speak
                </button>
                <button id="pause-btn" class="secondary-btn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="6" y="4" width="4" height="16"></rect>
                        <rect x="14" y="4" width="4" height="16"></rect>
                    </svg>
                    Pause
                </button>
                <button id="stop-btn" class="secondary-btn" disabled>
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    </svg>
                    Stop
                </button>
                <button id="download-btn" class="download-btn" title="Download Audio (MP3)">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                </button>
            </div>
        </main>

        <div class="status-indicator" id="status-indicator">
            <div class="pulse"></div>
            <span id="status-text">Ready</span>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
